name: CI/CD

on:
  push:
    branches: [ main, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test DocQnA.Tests --no-build --verbosity normal

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: doc-qna-client/package-lock.json
      - name: Install
        working-directory: doc-qna-client
        run: npm ci
      - name: Test
        working-directory: doc-qna-client
        run: npm test -- --run

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: frontend-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: doc-qna-client/package-lock.json
      - name: Install
        working-directory: doc-qna-client
        run: npm ci
      - name: Build
        working-directory: doc-qna-client
        env:
          VITE_API_BASE_URL: https://docqna-api.onrender.com/api
        run: npm run build

  # ── Only runs on main branch ──────────────────────────────────
  notify-deploy-ready:
    name: Ready to Deploy
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify
        run: |
          echo "✅ All tests passed on main branch"
          echo "🚀 Render and Vercel will auto-deploy"