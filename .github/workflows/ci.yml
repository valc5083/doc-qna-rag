name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run tests
        run: dotnet test DocQnA.Tests --no-build --verbosity normal

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: doc-qna-client/package-lock.json

      - name: Install dependencies
        working-directory: doc-qna-client
        run: npm ci

      - name: Run tests
        working-directory: doc-qna-client
        run: npm test -- --run

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: frontend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: doc-qna-client/package-lock.json

      - name: Install dependencies
        working-directory: doc-qna-client
        run: npm ci

      - name: Build
        working-directory: doc-qna-client
        env:
          VITE_API_BASE_URL: https://placeholder.railway.app/api
        run: npm run build