version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: docqna_postgres
    environment:
      POSTGRES_USER: docqna_user
      POSTGRES_PASSWORD: docqna_pass123
      POSTGRES_DB: docqna_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: docqna_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: